<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Wedstrijden - SCORR Kantine Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #00FF88;
            --dark: #0A0E27;
            --dark2: #1E2749;
            --red: #FF3B5C;
            --yellow: #FFD600;
            --white: #F0F4FF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lexend', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            color: var(--white);
            overflow-x: hidden;
            overflow-y: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== GOAL OVERLAY ===== */
        #goal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            background: rgba(0, 15, 8, 0.95);
            text-align: center;
        }
        #goal-overlay.active { display: block; }
        .goal-inner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .goal-emoji { font-size: 100px; animation: goalBounce 0.3s ease-in-out infinite alternate; margin-bottom: 10px; }
        .goal-text { font-size: 130px; font-weight: 900; color: var(--green); letter-spacing: -6px; line-height: 1; text-shadow: 0 0 80px rgba(0,255,136,0.9), 0 0 160px rgba(0,255,136,0.4); animation: goalPulse 0.25s ease-in-out infinite alternate; }
        .goal-team { font-size: 40px; font-weight: 700; color: white; margin-top: 20px; letter-spacing: 1px; }
        .goal-stand { font-size: 64px; font-weight: 900; color: var(--green); margin-top: 12px; letter-spacing: 4px; text-shadow: 0 0 40px rgba(0,255,136,0.5); }
        @keyframes goalPulse { from { transform: scale(1); } to { transform: scale(1.06); } }
        @keyframes goalBounce { from { transform: translateY(0) rotate(-5deg); } to { transform: translateY(-12px) rotate(5deg); } }

        /* ===== HEADER ===== */
        .header {
            position: relative; z-index: 1;
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
            border-bottom: 2px solid rgba(0,255,136,0.4);
            padding: 24px 40px;
            display: flex; justify-content: space-between; align-items: center; gap: 20px;
        }
        .header::after {
            content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .club-logo { width: 64px; height: 64px; background: rgba(255,255,255,0.08); border: 2px solid rgba(0,255,136,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
        .club-name { font-size: 28px; font-weight: 700; color: var(--white); line-height: 1.1; }
        .header-subtitle { font-size: 11px; color: var(--green); font-weight: 600; text-transform: uppercase; letter-spacing: 3px; margin-top: 4px; }
        .scorr-logo { font-size: 52px; font-weight: 900; letter-spacing: -3px; color: var(--green); text-shadow: 0 0 40px rgba(0,255,136,0.3); line-height: 1; flex-shrink: 0; }

        /* ===== LIVE TICKER ===== */
        .live-ticker { position: relative; z-index: 1; background: rgba(0,255,136,0.06); border-bottom: 1px solid rgba(0,255,136,0.15); padding: 10px 40px; display: flex; align-items: center; gap: 16px; }
        .live-pill { display: flex; align-items: center; gap: 6px; background: var(--red); color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; }
        .live-dot { width: 6px; height: 6px; background: white; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .ticker-text { font-size: 12px; color: rgba(240,244,255,0.5); font-weight: 300; letter-spacing: 1px; }
        .ticker-update { margin-left: auto; font-size: 11px; color: rgba(240,244,255,0.3); }

        /* ===== CONTAINER ===== */
        .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 32px 40px; overflow: hidden; }
        .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .section-icon { font-size: 24px; }
        .section-title { font-size: 18px; font-weight: 700; color: var(--white); flex: 1; }
        .match-count { font-size: 12px; color: rgba(240,244,255,0.4); background: rgba(255,255,255,0.06); padding: 4px 12px; border-radius: 20px; font-weight: 600; }

        /* ===== AUTO SCROLL ===== */
        @keyframes autoScroll {
            0%   { transform: translateY(0); }
            45%  { transform: translateY(var(--scroll-end, 0px)); }
            55%  { transform: translateY(var(--scroll-end, 0px)); }
            100% { transform: translateY(0); }
        }

        /* ===== MATCH CARD ===== */
        .match-card { background: rgba(30,39,73,0.6); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 12px 20px; margin-bottom: 8px; display: flex; align-items: stretch; gap: 16px; transition: all 0.3s ease; }
        .match-card.live { border-color: rgba(0,255,136,0.3); background: linear-gradient(135deg, rgba(30,39,73,0.8) 0%, rgba(0,255,136,0.04) 100%); box-shadow: 0 0 24px rgba(0,255,136,0.06); }
        .match-card.afgelopen { opacity: 0.7; }
        .match-status-datum { display: none; }
        .match-status { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; gap: 2px; min-width: 88px; flex-shrink: 0; }
        .match-time { font-size: 26px; font-weight: 700; color: var(--white); line-height: 1; }
        .match-time.live { color: var(--green); animation: glow 2s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 8px rgba(0,255,136,0.4); } 50% { text-shadow: 0 0 20px rgba(0,255,136,0.8); } }
        .status-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 3px 10px; border-radius: 10px; }
        .status-badge.live { background: var(--green); color: var(--dark); }
        .status-badge.straks { background: var(--yellow); color: var(--dark); }
        .status-badge.morgen { background: var(--yellow); color: var(--dark); }
        .status-badge.afgelopen { background: var(--red); color: white; }
        .status-badge.binnenkort { background: #4B6FBF; color: white; }
        .card-divider { width: 1px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
        .teams-row { flex: 1; display: grid; grid-template-columns: 1fr 120px 1fr; align-items: center; gap: 0; min-width: 0; }
        .team { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .team.away { flex-direction: row-reverse; }
        .team.away .team-name { text-align: right; }
        .team-logo { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
        .team-logo img { width: 85%; height: 85%; object-fit: contain; }
        .team-logo.initials { background: #003399; font-size: 13px; }
        .team-logo.initials.away { background: #1E2749; }
        .team-name { font-size: 18px; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1; }
        .score-block { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .score { font-size: 40px; font-weight: 900; color: var(--white); width: 44px; text-align: center; line-height: 1; }
        .match-card.live .score { color: var(--green); }
        .score-sep { font-size: 28px; font-weight: 300; color: rgba(240,244,255,0.2); line-height: 1; }
        .score-logo { display: none; }
        .veld-badge { font-size: 11px; color: rgba(240,244,255,0.3); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 2px 8px; font-weight: 600; flex-shrink: 0; }
        .empty-state { text-align: center; padding: 80px 40px; color: rgba(240,244,255,0.2); }
        .empty-icon { font-size: 64px; margin-bottom: 16px; }
        .empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .empty-sub { font-size: 14px; font-weight: 300; }
        .footer { position: relative; z-index: 1; padding: 24px 40px; color: rgba(255,255,255,0.2); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; }
        .footer-scorr { font-size: 20px; font-weight: 900; color: rgba(0,255,136,0.4); letter-spacing: -1px; }
        .auto-refresh { display: flex; align-items: center; gap: 8px; }
        .refresh-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: blink 2s infinite; }

        /* ===== PORTRAIT ===== */
        @media (orientation: portrait) {
            .header { padding: 12px 16px; gap: 10px; }
            .club-name { font-size: 16px; }
            .scorr-logo { font-size: 28px; }
            .club-logo { width: 40px; height: 40px; font-size: 18px; }
            .live-ticker { padding: 6px 12px; }
            .ticker-update { display: none; }
            .container { padding: 10px 12px; overflow: visible; }
            body { overflow-y: auto; }
            .match-card { padding: 10px 12px; gap: 8px; display: flex; align-items: center; }
            .match-status { min-width: 58px; gap: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
            .match-time { font-size: 17px; line-height: 1; }
            .card-divider { display: none; }
            .teams-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; flex: 1; min-width: 0; }
            .team { display: flex; flex-direction: row; align-items: center; gap: 6px; min-width: 0; width: auto; }
            .team.home { justify-content: flex-start; }
            .team.away { flex-direction: row-reverse; justify-content: flex-start; }
            .team.away .team-name { text-align: right; }
            .team .team-logo { display: none; }
            .score-logo { display: flex; width: 28px; height: 28px; border-radius: 50%; overflow: hidden; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
            .score-logo img { width: 100%; height: 100%; object-fit: contain; }
            .score-logo.initials-thuis { background: #003399; }
            .score-logo.initials-uit { background: #1E2749; }
            .team-name { font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1; }
            .score-block { display: flex; align-items: center; justify-content: center; gap: 6px; flex-shrink: 0; padding: 0; }
            .score { font-size: 18px; min-width: 20px; font-weight: 900; line-height: 1; }
            .score-sep { font-size: 18px; line-height: 1; }
            .veld-badge { display: none; }
            .footer { flex-direction: column; gap: 4px; padding: 10px 12px; font-size: 10px; }
            .goal-text { font-size: 80px; }
            .goal-stand { font-size: 48px; }
            .goal-team { font-size: 24px; }
            .goal-emoji { font-size: 60px; }
        }

        /* ===== TELEFOON PORTRAIT — Fotmob stijl ===== */
        @media (orientation: portrait) and (max-width: 500px) {
            .header { padding: 8px 12px; }
            .club-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
            .header-subtitle { font-size: 9px; letter-spacing: 1px; }
            .scorr-logo { font-size: 20px; }
            .club-logo { width: 30px; height: 30px; font-size: 14px; }
            .live-ticker { padding: 5px 10px; }
            .container { padding: 4px 6px; }
            .section-header { margin-bottom: 4px; padding-bottom: 4px; }
            .match-count { font-size: 10px; padding: 2px 8px; }

            /* Compact card */
            .match-card { padding: 5px 6px; margin-bottom: 2px; gap: 5px; border-radius: 8px; align-items: center; }
            .card-divider { display: none; }

            /* Status kolom — alleen tijd + badge, datum verbergen */
            .match-status { min-width: 30px; max-width: 30px; gap: 1px; align-items: center; }
            .match-time { font-size: 7px; font-weight: 700; white-space: nowrap; }
            .status-badge { font-size: 5px; padding: 1px 2px; border-radius: 3px; letter-spacing: 0; white-space: nowrap; }
            .match-status-datum { display: none !important; }

            /* Teams grid — naam | score+logo's | naam */
            .teams-row { display: flex; flex-direction: row; align-items: center; gap: 4px; flex: 1; min-width: 0; }
            .team.home { flex: 1; align-items: flex-end; }
            .team.away { flex: 1; align-items: flex-start; }
            .score-block { flex-shrink: 0; }

            /* Team kolommen — namen mogen wrappen, logo verbergen */
            .team { display: flex; flex-direction: column; gap: 0; min-width: 0; width: auto; }
            .team.home { align-items: flex-start; }
            .team.away { align-items: flex-end; flex-direction: column; }
            .team.away .team-name { text-align: left; }
            .team .team-logo { display: none; }
            .team-name { font-size: 8px; font-weight: 600; color: var(--white); white-space: normal; overflow: visible; text-overflow: unset; line-height: 1.25; word-break: break-word; }

            /* Score blok midden met logo's */
            .score-block { display: flex; align-items: center; justify-content: center; gap: 2px; flex-shrink: 0; }
            .score-logo { display: flex; width: 16px; height: 16px; border-radius: 50%; overflow: hidden; align-items: center; justify-content: center; font-size: 6px; font-weight: 700; flex-shrink: 0; }
            .score-logo img { width: 100%; height: 100%; object-fit: contain; }
            .score-logo.initials-thuis { background: #003399; }
            .score-logo.initials-uit { background: #1E2749; }
            .score { font-size: 12px; font-weight: 900; width: auto; min-width: 8px; text-align: center; }
            .score-sep { font-size: 9px; color: rgba(240,244,255,0.3); }

            .veld-badge { display: none; }
            .footer { padding: 6px 10px; font-size: 9px; }
        }

        /* ===== LANDSCAPE ===== */
        @media (orientation: landscape) {
            .header { padding: 10px 16px; }
            .club-name { font-size: 16px; }
            .scorr-logo { font-size: 28px; }
            .club-logo { width: 40px; height: 40px; font-size: 20px; }
            .live-ticker { padding: 6px 16px; }
            .ticker-update { display: none; }
            .container { padding: 10px 16px; }
            .section-header { margin-bottom: 12px; padding-bottom: 10px; }
            .match-card { padding: 4px 16px; gap: 12px; margin-bottom: 3px; position: relative; display: flex; align-items: center; }
            .match-status { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 6px; width: 160px; flex-shrink: 0; flex-wrap: wrap; }
            .match-time { font-size: 15px; font-weight: 700; line-height: 1; }
            .status-badge { font-size: 8px; padding: 2px 7px; }
            .teams-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; flex: 1; min-width: 0; }
            .team { display: flex; flex-direction: row; align-items: center; gap: 8px; min-width: 0; }
            .team.home { justify-content: flex-start; }
            .team.away { flex-direction: row-reverse; justify-content: flex-start; }
            .team.away .team-name { text-align: right; }
            .team .team-logo { display: none; }
            .score-logo { display: flex; width: 28px; height: 28px; border-radius: 50%; overflow: hidden; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
            .score-logo img { width: 100%; height: 100%; object-fit: contain; }
            .score-logo.initials-thuis { background: #003399; }
            .score-logo.initials-uit { background: #1E2749; }
            .team-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1; }
            .score-block { display: flex; align-items: center; justify-content: center; gap: 6px; flex-shrink: 0; }
            .score { font-size: 26px; font-weight: 900; line-height: 1; }
            .score-sep { font-size: 20px; line-height: 1; }
            .footer { padding: 10px 16px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- GOAL OVERLAY -->
    <div id="goal-overlay">
        <div class="goal-inner">
            <div class="goal-emoji">⚽</div>
            <div class="goal-text">GOAL!</div>
            <div class="goal-team" id="goal-team"></div>
            <div class="goal-stand" id="goal-stand"></div>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <div class="club-logo">&#x26BD;</div>
            <div>
                <div class="club-name">Pilot FC Purmerend, VV Monnickendam &amp; RKAV Volendam</div>
                <div class="header-subtitle">Live Wedstrijden · Pilot 2025/2026</div>
            </div>
        </div>
        <div class="scorr-logo">SCORR</div>
    </div>

    <div class="live-ticker">
        <div class="live-pill"><div class="live-dot"></div>Live</div>
        <div class="ticker-text">Scores worden automatisch bijgewerkt</div>
        <div class="ticker-update">Laatste update: <span id="lastUpdate">—</span></div>
    </div>

    <div class="container">
        <div class="section-header">
            <div class="section-icon">&#x26BD;</div>
            <div class="match-count" id="matchCount">laden...</div>
        </div>
        <div id="wedstrijden-list">
            <div class="empty-state">
                <div class="empty-icon">&#x23F3;</div>
                <div class="empty-title">Wedstrijden laden...</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-scorr">SCORR</div>
        <div>Laatste update: <span id="footerUpdate">—</span></div>
        <div class="auto-refresh"><div class="refresh-dot"></div><span>Updates elke 10 seconden</span></div>
    </div>

    <script>
        var DB_URL = 'https://scorr-c604a-default-rtdb.europe-west1.firebasedatabase.app/wedstrijden.json';

        // ===== GOAL TRACKING =====
        var vorigeScores = {};
        var goalTimeout = null;

        function checkGoals(wedstrijden) {
            wedstrijden.forEach(function(w) {
                if (w.status !== 'bezig' && w.status !== 'rust') return;
                var id = w.thuisteam + '_' + w.uitteam + '_' + (w.datum || '');
                var thuis = w.thuisscore || 0;
                var uit = w.uitscore || 0;
                if (vorigeScores[id] !== undefined) {
                    var prev = vorigeScores[id];
                    if (thuis > prev.thuis) toonGoal(w.thuisteam, thuis, uit);
                    else if (uit > prev.uit) toonGoal(w.uitteam, thuis, uit);
                }
                vorigeScores[id] = { thuis: thuis, uit: uit };
            });
        }

        function toonGoal(scorendTeam, thuis, uit) {
            var overlay = document.getElementById('goal-overlay');
            document.getElementById('goal-team').textContent = scorendTeam;
            document.getElementById('goal-stand').textContent = thuis + ' — ' + uit;
            overlay.classList.add('active');
            if (goalTimeout) clearTimeout(goalTimeout);
            goalTimeout = setTimeout(function() {
                overlay.classList.remove('active');
            }, 3500);
        }

function getLogo(naam) {
    if (!naam) return null;
    var lower = naam.toLowerCase();
    if (lower.indexOf('purmersteijn') !== -1) return '/frontend/clubs/icons/purmersteijn-512.png';
    if (lower.indexOf('purmerend') !== -1) return '/frontend/clubs/icons/fc-purmerend-512.png';
    if (lower.indexOf('monnickendam') !== -1) return '/frontend/clubs/icons/vv-monnickendam-512.png';
    if (lower.indexOf('volendam') !== -1 || lower.indexOf('rkav') !== -1) return '/frontend/clubs/icons/rkav-volendam-512.png';
    if (lower.indexOf('vva') !== -1 || lower.indexOf('spartaan') !== -1) return '/frontend/clubs/icons/vva-spartaan-512.png';
    if (lower.indexOf('wsv') !== -1) return '/frontend/clubs/icons/wsv-1930-512.png';
    if (lower.indexOf('hauwert') !== -1) return '/frontend/clubs/icons/vv-hauwert-65-512.png';
    if (lower.indexOf('wherevogels') !== -1) return '/frontend/clubs/icons/vv-de-wherevogels-512.jpeg';
    if (lower.indexOf('ucs') !== -1 || lower.indexOf('edo') !== -1) return '/frontend/clubs/icons/ucs-edo-512.png';
    if (lower.indexOf('sdob') !== -1) return '/frontend/clubs/icons/sdob-512.jpg';
    if (lower.indexOf('sdw') !== -1) return '/frontend/clubs/icons/sdw-512.png';
    if (lower.indexOf('graveland') !== -1) return '/frontend/clubs/icons/s-graveland-512.png';
    if (lower.indexOf('reiger') !== -1) return '/frontend/clubs/icons/reiger-boys-512.png';
    if (lower.indexOf('kolping') !== -1) return '/frontend/clubs/icons/kolping-boys-512.png';
    if (lower.indexOf('beemster') !== -1) return '/frontend/clubs/icons/beemster-512.png';
    if (lower.indexOf('waterwijk') !== -1) return '/frontend/clubs/icons/asc-waterwijk-512.png';
    if (lower.indexOf('zwaluwen') !== -1) return '/frontend/clubs/icons/zwaluwen-30-512.png';
    if (lower.indexOf('dzs') !== -1) return '/frontend/clubs/icons/dzs-512.jpg';
    if (lower.indexOf('schagen') !== -1) return '/frontend/clubs/icons/schagen-united-512.png';
    if (lower.indexOf('odysseus') !== -1) return '/frontend/clubs/icons/odysseus-91-512.jpg';
    if (lower.indexOf('westfriezen') !== -1) return '/frontend/clubs/icons/westfriezen-512.png';
    if (lower.indexOf('evc') !== -1 || lower.indexOf('edam') !== -1) return '/frontend/clubs/icons/evc-edam-512.png';
    if (lower.indexOf('castricum') !== -1) return '/frontend/clubs/icons/castricum-512.png';
    if (lower.indexOf('jong holland') !== -1 || lower.indexOf('jong-holland') !== -1) return '/frontend/clubs/icons/jong-holland-512.jpeg';
    if (lower.indexOf('fortuna') !== -1 || lower.indexOf('wormerveer') !== -1) return '/frontend/clubs/icons/fortuna-wormerveer-512.jpeg';
    if (lower.indexOf('zob') !== -1) return '/frontend/clubs/icons/zob-512.png';
    if (lower.indexOf('abcoude') !== -1) return '/frontend/clubs/icons/fc-abcoude-512.png';
    if (lower.indexOf("afc '34") !== -1 || lower.indexOf('afc 34') !== -1 || lower.indexOf('afc34') !== -1) return '/frontend/clubs/icons/afc-34-512.png';
    if (lower.indexOf('afc') !== -1) return '/frontend/clubs/icons/afc-amsterdam-512.png';
    if (lower.indexOf('sranang') !== -1) return '/frontend/clubs/icons/real-sranang-512.jpg';
    return null;
}

        function getInitials(naam) {
            if (!naam) return '?';
            return naam.split(' ').map(function(w) { return w[0]; }).join('').substring(0, 3).toUpperCase();
        }

        function getMinuut(w) {
            if (w.status !== 'bezig') return null;
            if (!w.startTijd) return null;
            var totaalSeconds = Math.floor((Date.now() - w.startTijd) / 1000) + (w.accumulatedSeconds || 0);
            var helfttijd = w.helfttijd || 45;
            var currentHalf = w.currentHalf || 1;
            var maxMinuut = currentHalf === 1 ? helfttijd : helfttijd * 2;
            var minuutRaw = Math.floor(totaalSeconds / 60);
            if (minuutRaw >= maxMinuut) return maxMinuut + "+" + (minuutRaw - maxMinuut + 1);
            return (minuutRaw + 1) + "";
        }

        function updateTimestamp() {
            var now = new Date();
            var str = now.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
            document.getElementById('lastUpdate').textContent = str;
            document.getElementById('footerUpdate').textContent = str;
        }

        function initAutoScroll() {
            if (window.innerWidth <= 500) return;
            var listEl = document.getElementById('wedstrijden-list');
            var header = document.querySelector('.header');
            var ticker = document.querySelector('.live-ticker');
            var secHeader = document.querySelector('.section-header');
            var footer = document.querySelector('.footer');
            var usedHeight = (header ? header.offsetHeight : 0)
                           + (ticker ? ticker.offsetHeight : 0)
                           + (secHeader ? secHeader.offsetHeight + 52 : 0)
                           + (footer ? footer.offsetHeight : 0);
            var overflow = listEl.scrollHeight - (window.innerHeight - usedHeight);
            if (overflow > 60) {
                var duration = Math.max(30, Math.round(overflow / 30));
                listEl.style.setProperty('--scroll-end', '-' + overflow + 'px');
                listEl.style.animation = 'autoScroll ' + duration + 's ease-in-out infinite';
            } else {
                listEl.style.animation = 'none';
            }
        }

        function renderWedstrijden(wedstrijden) {
            var list = document.getElementById('wedstrijden-list');
            var count = wedstrijden.length;
            document.getElementById('matchCount').textContent = count + ' wedstrijd' + (count !== 1 ? 'en' : '');

            if (count === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4C5;</div><div class="empty-title">Geen wedstrijden gepland</div><div class="empty-sub">Er staan geen wedstrijden in de komende 2 weken</div></div>';
                updateTimestamp();
                return;
            }

            wedstrijden.sort(function(a, b) {
                var aTop = a.status === 'bezig' || a.status === 'rust';
                var bTop = b.status === 'bezig' || b.status === 'rust';
                if (aTop && !bTop) return -1;
                if (bTop && !aTop) return 1;
                return (a.tijdstip || '').localeCompare(b.tijdstip || '');
            });

            var html = '';
            var nu = new Date();

            for (var i = 0; i < wedstrijden.length; i++) {
                var w = wedstrijden[i];
                var isLive = w.status === 'bezig';
                var isAfgelopen = w.status === 'afgelopen';
                var isRust = w.status === 'rust';
                var isAfgelast = w.status === 'afgelast';

                var wedstrijdStart = new Date(w.datum + 'T' + (w.tijdstip || '12:00') + ':00');
                var urenTot = (wedstrijdStart - nu) / (1000 * 60 * 60);

                var vandaag = new Date(); vandaag.setHours(0,0,0,0);
                var morgen = new Date(vandaag); morgen.setDate(morgen.getDate() + 1);
                var wedstrijdDag = new Date(w.datum + 'T00:00:00'); wedstrijdDag.setHours(0,0,0,0);

                var badgeClass, badgeText;
                if (isLive) { badgeClass = 'live'; badgeText = 'LIVE'; }
                else if (isRust) { badgeClass = 'live'; badgeText = 'HT'; }
                else if (isAfgelopen) { badgeClass = 'afgelopen'; badgeText = ''; }
                else if (isAfgelast) { badgeClass = 'afgelopen'; badgeText = 'AFGELAST'; }
                else if (urenTot <= 4) { badgeClass = 'straks'; badgeText = 'Straks'; }
                else if (wedstrijdDag.getTime() === vandaag.getTime()) { badgeClass = 'morgen'; badgeText = 'Vandaag'; }
                else if (wedstrijdDag.getTime() === morgen.getTime()) { badgeClass = 'morgen'; badgeText = 'Morgen'; }
                else { badgeClass = 'binnenkort'; badgeText = 'Binnenkort'; }

                var minutStr = getMinuut(w);
                var tijdText = isLive && minutStr ? minutStr : isRust ? 'HT' : isAfgelopen ? 'FT' : isAfgelast ? 'AFGELAST' : (w.tijdstip || '—');

                var datumStr = '';
                if (w.datum) {
                    var d = new Date(w.datum + 'T00:00:00');
                    datumStr = d.toLocaleDateString('nl-NL', {weekday:'short', day:'numeric', month:'short'});
                }

                var thuisLogo = getLogo(w.thuisteam);
                var uitLogo = getLogo(w.uitteam);

                // Logo's naast teamnaam (desktop/tablet)
                var thuisLogoHtml = thuisLogo
                    ? '<div class="team-logo"><img src="' + thuisLogo + '" onerror="this.parentNode.className=\'team-logo initials\';this.parentNode.innerHTML=\'' + getInitials(w.thuisteam) + '\'"></div>'
                    : '<div class="team-logo initials">' + getInitials(w.thuisteam) + '</div>';

                var uitLogoHtml = uitLogo
                    ? '<div class="team-logo"><img src="' + uitLogo + '" onerror="this.parentNode.className=\'team-logo initials away\';this.parentNode.innerHTML=\'' + getInitials(w.uitteam) + '\'"></div>'
                    : '<div class="team-logo initials away">' + getInitials(w.uitteam) + '</div>';

                // Logo's naast score (mobiel portrait)
                var thuisLogoScore = thuisLogo
                    ? '<div class="score-logo"><img src="' + thuisLogo + '" onerror="this.parentNode.className=\'score-logo initials-thuis\';this.parentNode.textContent=\'' + getInitials(w.thuisteam) + '\'"></div>'
                    : '<div class="score-logo initials-thuis">' + getInitials(w.thuisteam) + '</div>';

                var uitLogoScore = uitLogo
                    ? '<div class="score-logo"><img src="' + uitLogo + '" onerror="this.parentNode.className=\'score-logo initials-uit\';this.parentNode.textContent=\'' + getInitials(w.uitteam) + '\'"></div>'
                    : '<div class="score-logo initials-uit">' + getInitials(w.uitteam) + '</div>';

                var scoreHtml = (isLive || isAfgelopen || isRust)
                    ? '<div class="score">' + (w.thuisscore || 0) + '</div><div class="score-sep">—</div><div class="score">' + (w.uitscore || 0) + '</div>'
                    : '<div class="score" style="color:rgba(240,244,255,0.3)">-</div><div class="score-sep">—</div><div class="score" style="color:rgba(240,244,255,0.3)">-</div>';

                // Kaarten
                var thuisGeel = 0, thuisRood = 0, uitGeel = 0, uitRood = 0;
                if (w.events) {
                    for (var ek in w.events) {
                        var ev = w.events[ek];
                        var isThuis = ev.omschrijving && ev.omschrijving.indexOf(w.thuisteam) !== -1;
                        if (ev.type === 'yellow-card') isThuis ? thuisGeel++ : uitGeel++;
                        if (ev.type === 'red-card') isThuis ? thuisRood++ : uitRood++;
                    }
                }

                var thuisKaarten = '';
                for (var j = 0; j < thuisGeel; j++) thuisKaarten += '<span style="display:inline-block;width:8px;height:11px;background:#FFD600;border-radius:1px;margin:0 1px;opacity:0.85;"></span>';
                for (var j = 0; j < thuisRood; j++) thuisKaarten += '<span style="display:inline-block;width:8px;height:11px;background:#FF3B5C;border-radius:1px;margin:0 1px;opacity:0.85;"></span>';
                var uitKaarten = '';
                for (var j = 0; j < uitGeel; j++) uitKaarten += '<span style="display:inline-block;width:8px;height:11px;background:#FFD600;border-radius:1px;margin:0 1px;opacity:0.85;"></span>';
                for (var j = 0; j < uitRood; j++) uitKaarten += '<span style="display:inline-block;width:8px;height:11px;background:#FF3B5C;border-radius:1px;margin:0 1px;opacity:0.85;"></span>';

                html += '<div class="match-card ' + ((isLive || isRust) ? 'live' : '') + ' ' + (isAfgelopen ? 'afgelopen' : '') + '">';
                html += '<div class="match-status">';
                html += '<div class="match-time ' + (isLive ? 'live' : '') + '">' + tijdText + '</div>';
                html += '<div class="status-badge ' + badgeClass + '">' + badgeText + '</div>';
                html += '<div class="match-status-datum" style="font-size:11px;color:rgba(240,244,255,0.35);margin-top:4px;">' + datumStr + '</div>';
                html += '</div>';
                html += '<div class="card-divider"></div>';
                html += '<div class="teams-row">';
                html += '<div class="team home">' + thuisLogoHtml + '<div class="team-name">' + (w.thuisteam || 'Thuis') + '</div>' + (thuisKaarten ? '<div style="margin-top:3px;">' + thuisKaarten + '</div>' : '') + '</div>';
                html += '<div class="score-block">' + thuisLogoScore + scoreHtml + uitLogoScore + '</div>';
                html += '<div class="team away">' + uitLogoHtml + '<div class="team-name">' + (w.uitteam || 'Uit') + '</div>' + (uitKaarten ? '<div style="margin-top:3px;">' + uitKaarten + '</div>' : '') + '</div>';
                html += '</div>';
                html += '</div>';
            }

            list.innerHTML = html;
            updateTimestamp();
            setTimeout(initAutoScroll, 150);
        }

        function fetchWedstrijden() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', DB_URL, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        var wedstrijden = [];
                        var nu = new Date();
                        if (data) {
                            for (var key in data) {
                                if (data.hasOwnProperty(key)) {
                                    var w = data[key];
                                    if (w && w.datum) {
                                        var wedstrijdDatum = new Date(w.datum + 'T00:00:00');
                                        var verschilUren = (wedstrijdDatum - nu) / (1000 * 60 * 60);
                                        var eindTijd = new Date(w.datum + 'T' + (w.tijdstip || '12:00') + ':00');
                                        var urenNaEinde = (nu - eindTijd) / (1000 * 60 * 60);
                                        var dagVanDeWeek = nu.getDay(); // 0=zondag, 1=maandag, 6=zaterdag
                                        var maxUren = (dagVanDeWeek >= 1 && dagVanDeWeek <= 5) ? 336 : 48; // ma-vr: 2 weken, za-zo: alleen vandaag/morgen
                                        if (verschilUren <= maxUren && urenNaEinde <= 48) {
                                            wedstrijden.push(w);
                                        }
                                    }
                                }
                            }
                        }
                        checkGoals(wedstrijden);
                        renderWedstrijden(wedstrijden);
                    } catch(e) {
                        console.log('Parse error:', e);
                    }
                }
            };
            xhr.send();
        }

        fetchWedstrijden();
        setInterval(fetchWedstrijden, 10000);
    </script>
