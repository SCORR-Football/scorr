<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORR - Wedstrijd app</title>
    <link id="manifestLink" rel="manifest" href="/frontend/clubs/manifests/fc-purmerend.json">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        button {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-appearance: none;
            appearance: none;
            font-family: inherit;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Lexend', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0E27;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* ===== APP SHELL ===== */
        .app-shell {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #0A0E27 0%, #1E2749 100%);
            position: relative;
            overflow: hidden;
        }

        /* ===== HEADER BAR ===== */
        .header-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            background: rgba(0,0,0,0.4);
            flex-shrink: 0;
            gap: 8px;
            position: relative;
        }

        .header-bar .logo-text {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00FF88 0%, #00DDFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-bar .club-badge {
            width: 34px;
            height: 34px;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3));
            border-radius: 50%;
        }

        .header-bar .share-btn {
            position: absolute;
            right: 12px;
            width: 36px;
            height: 36px;
            background: #1E2749;
            color: #00FF88;
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
        }
        .header-bar .share-btn:active {
            background: #2A3460;
        }

        /* ===== SCORE PANEL ===== */
        .score-panel {
            padding: 12px 20px 8px;
            flex-shrink: 0;
        }

        .teams-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 8px;
        }

        .team-col {
            text-align: center;
        }

        .team-name-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0, 255, 136, 0.25);
            color: white;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            padding: 4px 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .team-name-input:focus {
            outline: none;
            border-bottom-color: #00FF88;
        }
        .team-name-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .score-number {
            font-size: 72px;
            font-weight: 900;
            color: white;
            line-height: 1;
            margin: 4px 0;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .score-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .score-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .score-btn.plus {
            background: #00FF88;
            color: #0A0E27;
        }
        .score-btn.plus:active {
            background: #00DD77;
            transform: scale(0.92);
        }
        .score-btn.minus {
            background: #1E2749;
            color: rgba(255,255,255,0.7);
        }
        .score-btn.minus:active {
            background: #2A3460;
            transform: scale(0.92);
        }

        .score-separator {
            font-size: 40px;
            font-weight: 900;
            color: #00FF88;
            padding-top: 28px;
        }

        /* ===== TIMER STRIP ===== */
        .timer-strip {
            padding: 8px 20px;
            text-align: center;
            flex-shrink: 0;
            border-top: 1px solid rgba(0, 255, 136, 0.15);
            border-bottom: 1px solid rgba(0, 255, 136, 0.15);
        }

        .timer-meta {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .timer-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .timer-display {
            font-size: 48px;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            color: #00FF88;
            letter-spacing: 3px;
            line-height: 1.1;
            text-shadow: 0 2px 16px rgba(0, 255, 136, 0.3);
        }

        .timer-controls-inline {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .timer-btn-small {
            width: 40px;
            height: 32px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .timer-btn-small.timeout {
            background: #FF3D71;
            color: white;
            border: none;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 52px;
            height: 36px;
            border-radius: 8px;
        }
        .timer-btn-small.timeout:active { background: #E6345E; transform: scale(0.95); }
        .timer-btn-small.timeout.resuming {
            background: #00FF88;
            color: #0A0E27;
            font-size: 18px;
            letter-spacing: 0;
        }
        .timer-btn-small.timeout.resuming:active { background: #00DD77; }

        .timer-sub-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 4px;
        }

        .setting-inline {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
        }

        .setting-inline .adj-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.08);
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setting-inline .adj-btn:active {
            background: rgba(255,255,255,0.1);
        }

        .setting-inline .val {
            min-width: 32px;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-weight: 700;
        }

        /* ===== NEXT HALF BUTTON ===== */
        .next-half-bar {
            padding: 8px 20px;
            flex-shrink: 0;
        }

        .next-half-btn {
            width: 100%;
            padding: 12px;
            background: #FF3D71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .next-half-btn:active {
            transform: scale(0.98);
            background: #E6345E;
        }

        /* ===== EVENTS TIMELINE ===== */
        .events-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }

        .events-area::-webkit-scrollbar {
            width: 3px;
        }
        .events-area::-webkit-scrollbar-thumb {
            background: #00FF88;
            border-radius: 3px;
        }

        .event-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }
        .event-item:last-child {
            border-bottom: none;
        }

        .event-minute {
            font-size: 13px;
            font-weight: 700;
            color: #00FF88;
            min-width: 30px;
            text-align: right;
            padding-top: 1px;
        }

        .event-text {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            line-height: 1.4;
            flex: 1;
        }

        .event-item.event-goal .event-minute { color: #00FF88; }
        .event-item.event-yellow .event-minute { color: #FFB800; }
        .event-item.event-red .event-minute { color: #FF3D71; }
        .event-item.event-half .event-minute,
        .event-item.event-end .event-minute { color: rgba(255,255,255,0.4); }
        .event-item.event-half .event-text,
        .event-item.event-end .event-text { color: rgba(255,255,255,0.5); font-style: italic; }

        .event-delete {
            background: none;
            border: none;
            color: rgba(255,255,255,0.2);
            font-size: 14px;
            cursor: pointer;
            padding: 2px 4px;
        }
        .event-delete:active {
            color: #FF3D71;
        }

        .no-events {
            text-align: center;
            color: rgba(255,255,255,0.25);
            padding: 20px;
            font-size: 13px;
            font-style: italic;
        }

        /* ===== BOTTOM TOOLBAR ===== */
        .bottom-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px 16px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            background: #0A0E27;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex-shrink: 0;
            border-top: 2px solid #00FF88;
        }

        .toolbar-btn {
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1E2749;
            color: white;
            transition: transform 0.1s;
            position: relative;
        }
        .toolbar-btn:active {
            transform: scale(0.9);
        }

        .toolbar-btn.yellow-card {
            background: rgba(255, 184, 0, 0.2);
            color: #FFB800;
            border: 2px solid rgba(255, 184, 0, 0.3);
        }
        .toolbar-btn.red-card {
            background: rgba(255, 61, 113, 0.2);
            color: #FF3D71;
            border: 2px solid rgba(255, 61, 113, 0.3);
        }
        .toolbar-btn.download-btn {
            background: rgba(0, 255, 136, 0.15);
            color: #00FF88;
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .toolbar-btn .btn-label {
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
            opacity: 0.7;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border-top: 4px solid #00FF88;
        }

        .modal-content h3 {
            color: #0A0E27;
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
        }

        .team-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .team-select-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            color: #666;
            font-family: inherit;
        }
        .team-select-btn.selected {
            background: #00FF88;
            border-color: #0A0E27;
            color: #0A0E27;
        }

        .number-grid-label {
            font-weight: 700;
            color: #0A0E27;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        .number-btn {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #666;
            font-family: inherit;
        }
        .number-btn.selected {
            background: #00FF88;
            border-color: #0A0E27;
            color: #0A0E27;
        }

        .custom-number-container {
            margin-bottom: 10px;
        }

        .custom-number-container label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 4px;
            display: block;
        }

        .custom-number-container input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            font-family: inherit;
        }
        .custom-number-container input:focus {
            outline: none;
            border-color: #00FF88;
        }

        .player-name-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .player-name-input:focus {
            outline: none;
            border-color: #00FF88;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-cancel {
            background: #666;
            color: white;
        }
        .btn-confirm {
            background: #00FF88;
            color: #0A0E27;
        }

        /* Flash animation for timer */
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Wake lock indicator */
        #wakeLockStatus {
            font-size: 10px;
            color: rgba(0, 255, 136, 0.5);
            margin-top: 2px;
        }

        /* Hide team dropdown (used for older code compat) */
        #teamDropdownContainer { display: none !important; }

        /* Print styles */
        @media print {
            body { background: white; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <!-- HEADER -->
        <div class="header-bar">
            <img id="clubLogo" class="club-badge" alt="Club" onerror="this.style.display='none'">
            <span class="logo-text">SCORR</span>
            <button class="share-btn" onclick="shareApp()">📤</button>
            <button class="share-btn" id="logoutBtn" style="right:52px;" title="Uitloggen">🚪</button>
        </div>

        <!-- SCORE PANEL -->
        <div class="score-panel">
            <div class="teams-row">
                <div class="team-col">
                    <input type="text" class="team-name-input" id="homeTeamName" value="Fc Purmerend" placeholder="Thuisploeg">
                    <div class="score-number" id="homeScore">0</div>
                    <div class="score-btns">
                        <button class="score-btn minus" id="homeMinusBtn">−</button>
                        <button class="score-btn plus" id="homePlusBtn">+</button>
                    </div>
                </div>
                <div class="score-separator">-</div>
                <div class="team-col">
                    <input type="text" class="team-name-input" id="awayTeamName" value="Tegenstander" placeholder="Uitploeg">
                    <div class="score-number" id="awayScore">0</div>
                    <div class="score-btns">
                        <button class="score-btn minus" id="awayMinusBtn">−</button>
                        <button class="score-btn plus" id="awayPlusBtn">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TIMER STRIP -->
        <div class="timer-strip">
            <div class="timer-meta" id="halfIndicator">1e Helft</div>
            <div class="timer-row">
                <div class="timer-display" id="timerDisplay">00:00</div>
                <div class="timer-controls-inline">
                   <button class="timer-btn-small timeout" id="pauseBtn">TIME-OUT</button>
                </div>
            </div>
 
            <div id="wakeLockStatus"></div>
        </div>

        <!-- NEXT HALF / END MATCH -->
        <div class="next-half-bar">
            <button class="next-half-btn" id="nextHalfBtn">▶ STARTEN WEDSTRIJD</button>
        </div>

        <!-- EVENTS TIMELINE -->
        <div class="events-area">
            <div id="eventsList">
                <div class="no-events">Nog geen gebeurtenissen</div>
            </div>
        </div>

        <!-- BOTTOM TOOLBAR -->
        <div class="bottom-toolbar">
            <button class="toolbar-btn yellow-card" id="yellowBtn" title="Gele kaart">
                🟨
            </button>
            <button class="toolbar-btn red-card" id="redBtn" title="Rode kaart">
                🟥
            </button>
            <button class="toolbar-btn" id="resetBtn" title="Reset">
                ↺
                <span class="btn-label">RESET</span>
            </button>
            <button class="toolbar-btn download-btn" id="downloadBtn" title="Verslag">
                📄
                <span class="btn-label">PDF</span>
            </button>
        </div>
    </div>

    <!-- EVENT MODAL -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Gebeurtenis toevoegen</h3>

            <div id="teamButtonsContainer" class="team-buttons" style="display: none;">
                <button class="team-select-btn" id="homeTeamBtn" data-team="home">Thuisploeg</button>
                <button class="team-select-btn" id="awayTeamBtn" data-team="away">Uitploeg</button>
            </div>

            <div id="teamDropdownContainer">
                <select id="modalTeam">
                    <option value="home">Thuisploeg</option>
                    <option value="away">Uitploeg</option>
                </select>
            </div>

            <div class="number-grid-label">Rugnummer:</div>
            <div class="number-grid" id="numberGrid"></div>

            <div class="custom-number-container">
                <label for="customNumber">Anders:</label>
                <input type="number" id="customNumber" placeholder="Vul rugnr in" min="0" max="99">
            </div>

            <input type="text" id="modalPlayerName" class="player-name-input" placeholder="Naam speler (optioneel)">

            <div class="modal-buttons">
                <button class="btn-cancel" id="cancelBtn">Annuleren</button>
                <button class="btn-confirm" id="confirmBtn">Bevestigen</button>
            </div>
        </div>
    </div>

    <script>

        // Club logo op basis van URL parameter
        (function() {
            const params = new URLSearchParams(window.location.search);
            const club = params.get('club') || 'fc-purmerend';
            const logos = {
                'fc-purmerend': '/frontend/clubs/icons/fc-purmerend-512.png',
                'vv-monnickendam': '/frontend/clubs/icons/vv-monnickendam-512.png',
                'rkav-volendam': '/frontend/clubs/icons/rkav-volendam-512.png'
            };
            document.addEventListener('DOMContentLoaded', function() {
            const logo = document.getElementById('clubLogo');
            if (logo && logos[club]) logo.src = logos[club];
            const manifestLink = document.getElementById('manifestLink');
            if (manifestLink) manifestLink.href = '/frontend/clubs/manifests/' + club + '.json';
        });
        })();
        // ===== STATE =====
        console.log('🚀 SCORR Scheidsrechter App loaded');

        window.addEventListener('error', function(e) {
            if (e.message === 'Script error.' || e.message === 'Script error') return;
            console.error('❌ Error:', e.message, 'line', e.lineno);
        });

        let timerStartTime = null;
        let timerPausedAt = null;
        let accumulatedSeconds = 0;
        let timerInterval = null;
        let isRunning = false;
        let currentHalf = 0;
        let homeScoreValue = 0;
        let awayScoreValue = 0;
        let events = [];
        let currentEventType = '';
        let currentGoalTeam = '';
        let selectedTeam = '';
        let selectedNumber = '';
        let injuryTime = 0;
        let halfDuration = 45;
        let wakeLock = null;

        // ===== LOCAL STORAGE =====
        function loadTimerState() {
            const saved = localStorage.getItem('scorr_timer_state');
            const savedWedstrijdId = localStorage.getItem('scorr_timer_wedstrijdId');
            const huidigId = localStorage.getItem('wedstrijdId');
            if (saved && savedWedstrijdId === huidigId) {
                try {
                    const state = JSON.parse(saved);
                    timerStartTime = state.startTime;
                    timerPausedAt = state.pausedAt;
                    accumulatedSeconds = state.accumulated || 0;
                    isRunning = state.isRunning || false;
                    currentHalf = (state.half !== undefined) ? state.half : 0;
                    if (isRunning && timerStartTime) {
                        const now = Date.now();
                        const elapsed = Math.floor((now - timerStartTime) / 1000);
                        accumulatedSeconds = state.accumulated + elapsed;
                        timerStartTime = now;
                        startTimer();
                    }
                } catch (e) { console.error('Load error:', e); }
            }
        }

        function saveTimerState() {
    localStorage.setItem('scorr_timer_wedstrijdId', localStorage.getItem('wedstrijdId') || '');
    localStorage.setItem('scorr_timer_state', JSON.stringify({
        startTime: timerStartTime,
        pausedAt: timerPausedAt,
        accumulated: accumulatedSeconds,
        isRunning: isRunning,
        half: currentHalf
    }));
    // Sync naar Firebase
    var wId = localStorage.getItem('wedstrijdId');
    if (wId && window._firebaseDb) {
        import("https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js").then(function(m) {
            m.update(m.ref(window._firebaseDb, 'wedstrijden/' + wId), {
                startTijd: timerStartTime || null,
                accumulatedSeconds: accumulatedSeconds,
                currentHalf: currentHalf,
                currentMinuut: isRunning && timerStartTime

        async function startTimer() {
        if (!isRunning) {
        isRunning = true;
        timerStartTime = Date.now();
        localStorage.setItem('startTijd', timerStartTime);

        var wId = localStorage.getItem('wedstrijdId');

let timeExpiredTriggered = false;

        function checkTimeExpired() {
            const currentSeconds = getCurrentSeconds();
            let targetSeconds;
            if (currentHalf === 1) {
                targetSeconds = (halfDuration + injuryTime) * 60;
            } else {
                targetSeconds = (2 * halfDuration + injuryTime) * 60;
            }
            if (currentSeconds >= targetSeconds && !timeExpiredTriggered) {
                timeExpiredTriggered = true;
                playWhistleAndVibrate();
            }
            if (currentSeconds < targetSeconds) timeExpiredTriggered = false;
        }

        function playWhistleAndVibrate() {
            initAudioContext();
            if ('vibrate' in navigator) {
                if (currentHalf === 1) navigator.vibrate([300, 200, 300, 200, 300]);
                else navigator.vibrate([900, 250, 300, 200, 300]);

            playWhistleSound();
            showTimeExpiredNotification();

        function playWhistleSound() {
            if (!audioCtx) return;
            function playBlast(startTime, duration) {
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                const distortion = audioCtx.createWaveShaper();
                const curve = new Float32Array(256);
                for (let i = 0; i < 256; i++) {
                    const x = (i * 2) / 256 - 1;
                    curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
                }
                distortion.curve = curve;
                osc1.connect(distortion); osc2.connect(distortion);
                distortion.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc1.type = 'sine'; osc2.type = 'sine';
                osc1.frequency.setValueAtTime(3100, startTime);
                osc1.frequency.linearRampToValueAtTime(3200, startTime + duration * 0.1);
                osc1.frequency.setValueAtTime(3200, startTime + duration * 0.9);
                osc1.frequency.linearRampToValueAtTime(3050, startTime + duration);
                osc2.frequency.setValueAtTime(3140, startTime);
                osc2.frequency.linearRampToValueAtTime(3250, startTime + duration * 0.1);
                osc2.frequency.setValueAtTime(3250, startTime + duration * 0.9);
                osc2.frequency.linearRampToValueAtTime(3090, startTime + duration);
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.4, startTime + 0.02);
                gainNode.gain.setValueAtTime(0.35, startTime + duration - 0.08);
                gainNode.gain.linearRampToValueAtTime(0, startTime + duration);
                osc1.start(startTime); osc1.stop(startTime + duration);
                osc2.start(startTime); osc2.stop(startTime + duration);
            }
            const now = audioCtx.currentTime;
            if (currentHalf === 1) {
                playBlast(now, 0.35); playBlast(now + 0.55, 0.35); playBlast(now + 1.10, 0.35);
            } else {
                playBlast(now, 0.9); playBlast(now + 1.2, 0.35); playBlast(now + 1.75, 0.35);
            }
        }

        huidigWedstrijdId = wedstrijdId;

        localStorage.setItem('thuisteam', w.thuisteam);

        document.getElementById('homeTeamName').value = w.thuisteam;
        document.getElementById('awayTeamName').value = w.uitteam;
        if (w.helfttijd) halfDuration = w.helfttijd;
        homeScoreValue = w.thuisscore || 0;
        awayScoreValue = w.uitscore || 0;
        document.getElementById('homeScore').textContent = homeScoreValue;
        document.getElementById('awayScore').textContent = awayScoreValue;

        // Events herladen
        events = [];
        if (w.events) {
            const geladen = Object.values(w.events).sort((a, b) => b.tijdstip - a.tijdstip);
            geladen.forEach(ev => {
                const type = ev.type === 'yellow-card' ? 'yellow' : ev.type === 'red-card' ? 'red' : 'goal';
                const team = ev.omschrijving && ev.omschrijving.indexOf(w.thuisteam) !== -1 ? 'home' : 'away';
                events.push({ minute: ev.minuut, type, description: ev.omschrijving, team });
            });
            renderEvents();
        }

        // ✅ Timer herstel vanuit Firebase als wedstrijd bezig is
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        localStorage.removeItem('scorr_timer_state');

        if (w.status === 'bezig' && w.startTijd) {
        currentHalf = w.currentHalf || 1;
        accumulatedSeconds = w.accumulatedSeconds || 0;
        timerStartTime = w.startTijd;
        isRunning = true;
        const btn = document.getElementById('nextHalfBtn');
        btn.style.display = 'block';
        btn.textContent = currentHalf === 1 ? '⏭️ EINDE 1E HELFT' : '⏹ EINDE WEDSTRIJD';
        initAudioContext();
        requestWakeLock();
        let saveCounter = 0;
        timerInterval = setInterval(() => {
            updateDisplay();
            checkTimeExpired();
            saveCounter++;
            if (saveCounter >= 50) { saveTimerState(); saveCounter = 0; }
        }, 100);
        updateDisplay();
        } else if (w.status === 'rust') {
            currentHalf = 2;
            accumulatedSeconds = (w.helfttijd || 45) * 60;
            timerStartTime = null;
            isRunning = false;
            updateDisplay();
            const btn = document.getElementById('nextHalfBtn');
            btn.style.display = 'block';
            btn.textContent = '▶ STARTEN 2E HELFT';
        } else {
            accumulatedSeconds = 0;
            timerStartTime = null;
            timerPausedAt = null;
            isRunning = false;
            currentHalf = 0;
            updateDisplay();
            const btn = document.getElementById('nextHalfBtn');
            btn.style.display = 'block';
            btn.textContent = '▶ STARTEN WEDSTRIJD';
        }

        document.getElementById('scorr-selectie-overlay').style.display = 'none';
        toonBanner(w, huidigTeamNaam, huidigUser);
    });
};

    <button id="logoutBtnBanner" style="background:transparent; border:1px solid rgba(255,59,92,0.4); color:#FF3B5C; border-radius:6px; padding:6px 10px; font-size:11px; font-weight:600; font-family:'Lexend',sans-serif; cursor:pointer; white-space:nowrap;">🚪</button>

</div>

<!-- Popup HTML -->
<div id="scorr-popup-overlay" style="display:none; position:fixed; inset:0; background:rgba(10,14,39,0.95); z-index:9999; align-items:center; justify-content:center; padding:20px; overflow-y:auto;">
  <div style="position:relative; background:#1E2749; border:1px solid rgba(0,255,136,0.3); border-radius:16px; padding:32px; width:100%; max-width:420px; font-family:'Lexend',sans-serif;">

    <!-- Close X — sluit popup zodat je de uitlog-knop rechtsboven kunt gebruiken -->
    <button type="button" id="popup-close-btn" aria-label="Sluiten" onclick="document.getElementById('scorr-popup-overlay').style.display='none';" style="position:absolute; top:12px; right:12px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:50%; color:rgba(240,244,255,0.7); font-size:18px; line-height:1; font-family:'Lexend',sans-serif; cursor:pointer; padding:0;">×</button>

    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:28px; font-weight:900; color:#00FF88; letter-spacing:-1px;">SCORR</div>
      <div id="popup-subtitel" style="font-size:12px; color:rgba(240,244,255,0.5); letter-spacing:3px; text-transform:uppercase; margin-top:4px;">Wedstrijd instellen</div>
    </div>

    <div style="margin-bottom:16px;">
      <label style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#00FF88; font-weight:600; display:block; margin-bottom:6px;">Jouw team</label>
      <div id="popup-team-naam" style="background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.2); border-radius:8px; padding:12px 16px; font-size:15px; font-weight:600; color:#F0F4FF;"></div>
    </div>

    <div style="margin-bottom:16px;">
      <label style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(240,244,255,0.6); font-weight:600; display:block; margin-bottom:6px;">Wij spelen</label>
      <div style="display:flex; gap:8px;">
        <button type="button" id="popup-thuis-btn" onclick="window._selecteerThuisUit('thuis')" style="flex:1; padding:12px; border:2px solid #00FF88; border-radius:8px; background:rgba(0,255,136,0.1); color:#00FF88; font-size:14px; font-weight:700; font-family:'Lexend',sans-serif; cursor:pointer;">🏠 Thuis</button>
        <button type="button" id="popup-uit-btn" onclick="window._selecteerThuisUit('uit')" style="flex:1; padding:12px; border:2px solid rgba(255,255,255,0.15); border-radius:8px; background:rgba(255,255,255,0.05); color:rgba(240,244,255,0.5); font-size:14px; font-weight:700; font-family:'Lexend',sans-serif; cursor:pointer;">✈️ Uit</button>
      </div>
    </div>

    <div style="margin-bottom:16px;">
      <label style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(240,244,255,0.6); font-weight:600; display:block; margin-bottom:6px;">Tegenstander *</label>
      <input id="popup-tegenstander" type="text" placeholder="bijv. Ajax O14-3" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:12px 16px; font-size:15px; color:#F0F4FF; font-family:'Lexend',sans-serif; outline:none;" />
    </div>

    <div style="margin-bottom:16px;">
      <label style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(240,244,255,0.6); font-weight:600; display:block; margin-bottom:6px;">Klasse *</label>
      <input id="popup-klasse" type="text" placeholder="bijv. 4e klasse district" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:12px 16px; font-size:15px; color:#F0F4FF; font-family:'Lexend',sans-serif; outline:none;" />
    </div>

    <div style="margin-bottom:16px;">
      <label style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(240,244,255,0.6); font-weight:600; display:block; margin-bottom:6px;">Veld</label>
      <select id="popup-veld" style="width:100%; background:#1E2749; border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:12px 16px; font-size:15px; color:#F0F4FF; font-family:'Lexend',sans-serif; outline:none; appearance:none;">
        <option value="A">Veld A</option>
        <option value="B">Veld B</option>
        <option value="C">Veld C</option>
        <option value="D">Veld D</option>
        <option value="E">Veld E</option>
        <option value="F">Veld F</option>
        <option value="n.v.t.">n.v.t.</option>
      </select>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px;">
      <div>
        <label style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(240,244,255,0.6); font-weight:600; display:block; margin-bottom:6px;">Duur per helft (min)</label>
        <input id="popup-helfttijd" type="number" value="45" min="10" max="90" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:12px 16px; font-size:15px; color:#F0F4FF; font-family:'Lexend',sans-serif; outline:none;" />
      </div>
      <div>
        <label style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(240,244,255,0.6); font-weight:600; display:block; margin-bottom:6px;">Datum</label>
        <input id="popup-datum" type="date" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:12px 16px; font-size:14px; color:#F0F4FF; font-family:'Lexend',sans-serif; outline:none;" />
      </div>
      <div>
        <label style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(240,244,255,0.6); font-weight:600; display:block; margin-bottom:6px;">Tijdstip</label>
        <input id="popup-tijdstip" type="time" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:12px 16px; font-size:14px; color:#F0F4FF; font-family:'Lexend',sans-serif; outline:none;" />
      </div>
    </div>

    <div id="popup-error" style="display:none; background:rgba(255,59,92,0.1); border:1px solid rgba(255,59,92,0.3); border-radius:8px; padding:10px 16px; font-size:13px; color:#FF3B5C; margin-bottom:16px;">
      Vul tegenstander en klasse in om te starten.
    </div>

    <button id="popup-start-btn" style="width:100%; background:#00FF88; color:#0A0E27; border:none; border-radius:8px; padding:16px; font-size:16px; font-weight:700; font-family:'Lexend',sans-serif; cursor:pointer; letter-spacing:1px;">
      ▶ GA NAAR DE WEDSTRIJD
    </button>

    <!-- Afgelast knop — alleen zichtbaar bij bestaande wedstrijd -->
    <div id="popup-afgelast-container" style="display:none; margin-top:12px;">
      <button id="popup-afgelast-btn" style="width:100%; background:transparent; border:1px solid rgba(255,59,92,0.4); color:#FF3B5C; border-radius:8px; padding:12px; font-size:13px; font-weight:700; font-family:'Lexend',sans-serif; cursor:pointer; letter-spacing:1px;">
        ⛔ WEDSTRIJD AFGELASTEN
      </button>
    </div>

  </div>
</div>
</body>
</html>
